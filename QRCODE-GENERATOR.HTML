<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.18), transparent 35%),
                        radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.12), transparent 25%),
                        linear-gradient(135deg, #0f172a 0%, #1e293b 42%, #334155 100%);
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .container {
            width: min(100%, 720px);
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid rgba(148, 163, 184, 0.15);
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.35);
            border-radius: 32px;
            overflow: hidden;
            backdrop-filter: blur(12px);
        }

        .hero {
            padding: 40px 40px 0;
            text-align: center;
        }

        .hero h1 {
            font-size: clamp(2.2rem, 4vw, 3.4rem);
            letter-spacing: -0.04em;
            color: #f8fafc;
            margin-bottom: 16px;
        }

        .hero p {
            color: #cbd5e1;
            font-size: 1rem;
            max-width: 660px;
            margin: 0 auto 24px;
            line-height: 1.75;
        }

        .glass-card {
            margin: 0 auto 40px;
            max-width: 680px;
            background: rgba(15, 23, 42, 0.78);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 28px;
            padding: 32px;
            backdrop-filter: blur(10px);
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #94a3b8;
            font-size: 0.95rem;
            letter-spacing: 0.02em;
        }

        textarea {
            width: 100%;
            min-height: 140px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.16);
            border-radius: 22px;
            padding: 18px 20px;
            color: #f8fafc;
            font-size: 1rem;
            resize: vertical;
            transition: border-color 0.3s ease, transform 0.2s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #60a5fa;
            transform: translateY(-1px);
        }

        button[type="submit"],
        .download-btn {
            width: 100%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 14px 22px;
            border: none;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
            color: #f8fafc;
            background: linear-gradient(135deg, #38bdf8 0%, #6366f1 100%);
            box-shadow: 0 16px 30px rgba(56, 189, 248, 0.18);
        }

        button[type="submit"]:hover,
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 22px 32px rgba(56, 189, 248, 0.28);
        }

        .download-btn {
            margin-top: 18px;
            background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
            box-shadow: 0 18px 32px rgba(16, 185, 129, 0.22);
        }

        #qrOutput {
            margin-top: 30px;
            text-align: center;
            padding-top: 10px;
        }

        #qrCode {
            display: inline-block;
            padding: 24px;
            background: rgba(15, 23, 42, 0.85);
            border-radius: 28px;
            border: 1px solid rgba(148, 163, 184, 0.15);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
        }

        .qr-label {
            margin-bottom: 14px;
            color: #cbd5e1;
            font-size: 0.95rem;
            letter-spacing: 0.02em;
        }

        .footer {
            text-align: center;
            padding: 24px 20px 28px;
            color: #94a3b8;
            font-size: 0.95rem;
            border-top: 1px solid rgba(148, 163, 184, 0.12);
        }

        .footer span {
            color: #38bdf8;
            font-weight: 700;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .hero-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            margin-bottom: 24px;
            background: rgba(56, 189, 248, 0.12);
            border-radius: 24px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            color: #38bdf8;
            font-size: 1.8rem;
            animation: float 6s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <div class="hero-icon">🔲</div>
            <h1>Premium QR Code Generator</h1>
            
            <p>Generate elegant, high-quality QR codes instantly. Perfect for business cards, branding, event invitations, and premium digital experiences.</p>
        </div>

        <div class="glass-card">
            <form id="qrForm">
                <div class="form-group">
                    <label for="dataInput">Enter Data for QR Code</label>
                    <textarea id="dataInput" placeholder="Enter URL, text, contact info, or custom data..." rows="5" required></textarea>
                </div>
                <button type="submit">Create Your QR Code</button>
            </form>

            <div id="qrOutput"></div>
        </div>

        <div class="footer">
            Crafted with precision for a sleek digital experience • Designed by <span>Prince Sah</span>
        </div>
    </div>

    <script>
        document.getElementById('qrForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const data = document.getElementById('dataInput').value.trim();

            if (!data) {
                alert('Please enter some data');
                return;
            }

            const output = document.getElementById('qrOutput');
            output.innerHTML = '';

            const qrWrapper = document.createElement('div');
            qrWrapper.id = 'qrCode';
            output.appendChild(qrWrapper);

            new QRCode(qrWrapper, {
                text: data,
                width: 220,
                height: 220,
                colorDark: '#0f172a',
                colorLight: '#f8fafc',
                correctLevel: QRCode.CorrectLevel.H
            });

            const label = document.createElement('div');
            label.className = 'qr-label';
            label.textContent = 'Your premium QR code is ready.';
            output.insertBefore(label, qrWrapper);

            const downloadBtn = document.createElement('button');
            downloadBtn.className = 'download-btn';
            downloadBtn.textContent = 'Download QR Code';
            downloadBtn.onclick = function() {
                const canvas = qrWrapper.querySelector('canvas');
                if (!canvas) return;
                const link = document.createElement('a');
                link.href = canvas.toDataURL('image/png');
                link.download = 'qrcode.png';
                link.click();
            };
            output.appendChild(downloadBtn);
        });
    </script>
</body>
</html>
